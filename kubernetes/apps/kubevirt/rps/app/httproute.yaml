---
# yaml-language-server: $schema=https://cluster-schemas.smbonn.me/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app rps
spec:
  hostnames:
    - projects.smbonn.me
  parentRefs:
    - name: envoy-external
      namespace: networking
      port: 443
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /hooks/
      backendRefs:
        - name: rps
          port: 80
