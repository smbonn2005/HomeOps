---
# yaml-language-server: $schema=https://cluster-schemas.pages.dev/kubevirt.io/virtualmachine_v1.json
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: &app rps
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: *app
    spec:
      domain:
        cpu:
          cores: 2
        firmware:
          bootloader:
            efi:
              secureBoot: false
        devices:
          disks:
            - name: rps
              bootOrder: 1
              disk:
                bus: virtio
            - name: ubuntu-os
              bootOrder: 2
              cdrom:
                bus: sata
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            - name: default
              macAddress: b6:12:29:88:50:59
              masquerade: {}
        resources:
          limits:
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 2Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rps
          persistentVolumeClaim:
            claimName: rps
        - name: ubuntu-os
          dataVolume:
            name: ubuntu-26.04-server
        - name: cloudinit
          cloudInitNoCloud:
            secretRef:
              name: rps-cloudinit
