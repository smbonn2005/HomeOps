---
# yaml-language-server: $schema=https://cluster-schemas.pages.dev/kubevirt.io/virtualmachine_v1.json
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: &app rps
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: *app
    spec:
      domain:
        cpu:
          cores: 2
        devices:
          disks:
            - name: ubuntu-os
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            - name: default
              macAddress: b6:12:29:88:50:59
              masquerade: {}
        resources:
          limits:
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 2Gi
      networks:
        - name: default
          pod: {}
      volumes:
        - name: ubuntu-os
          dataVolume:
            name: rps
        - name: cloudinit
          cloudInitNoCloud:
            secretRef:
              name: rps-cloudinit
  dataVolumeTemplates:
    - metadata:
        name: rps
      spec:
        source:
          http:
            url: https://cloud-images.ubuntu.com/releases/resolute/release/ubuntu-26.04-server-cloudimg-amd64.vmdk
        storage:
          accessModes:
            - ReadWriteOnce
          volumeMode: Filesystem
          resources:
            requests:
              storage: 35Gi
          storageClassName: ceph-block
