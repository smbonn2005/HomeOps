---
# yaml-language-server: $schema=https://cluster-schemas.pages.dev/kubevirt.io/kubevirt_v1.json
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  configuration:
    developerConfiguration:
      featureGates:
        - LiveMigration
        - NetworkBindingPlugins
    smbios:
      family: ccio
      manufacturer: Talos Virtualization
      product: talosvm
      sku: TalosCloud
      version: v0.1.0
  customizeComponents:
    patches:
      # Increases leader election timeouts to survive etcd compaction spikes.
      # NOTE: image tags below must be kept in sync with the kubevirt version in kustomization.yaml
      - patch: '[{"op":"replace","path":"/spec/template/spec/containers/0/args","value":["--launcher-image","quay.io/kubevirt/virt-launcher:v1.8.2","--exporter-image","quay.io/kubevirt/virt-exportserver:v1.8.2","--port","8443","-v","2","--leader-elect-lease-duration","60s","--leader-elect-renew-deadline","40s","--leader-elect-retry-period","10s"]}]'
        resourceName: virt-controller
        resourceType: Deployment
        type: json
  workloadUpdateStrategy:
    workloadUpdateMethods:
      - LiveMigrate
