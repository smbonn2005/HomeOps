---
# yaml-language-server: $schema=https://cluster-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  chartRef:
    kind: OCIRepository
    name: gatus
  interval: 1h
  values:
    fullnameOverride: gatus
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    gatus:
      delayStartSeconds: "5"
      env:
        TZ: America/New_York
      envFrom:
        - secretRef:
            name: &secret gatus-secret
      logLevel: warn
    sidecar:
      kinds:
        httproute:
          enable: true
          auto: true
        service:
          enable: true
    initContainers:
      - name: init-db
        image: ghcr.io/home-operations/postgres-init:18.4@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
        envFrom:
          - secretRef:
              name: *secret
    httpRoute:
      enabled: true
      annotations:
        gatus.home-operations.com/enabled: "false"
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: Observability
        gethomepage.dev/name: Gatus
        gethomepage.dev/icon: gatus.png
        gethomepage.dev/pod-selector: "app.kubernetes.io/name=gatus-sidecar"
        gethomepage.dev/widget.type: gatus
        gethomepage.dev/widget.url: http://gatus.monitoring:8080
      hostnames:
        - status.smbonn.me
      parentRefs:
        - name: envoy-external
          namespace: networking
    monitoring:
      serviceMonitor:
        enabled: true
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
    resources:
      requests:
        cpu: 100m
      limits:
        memory: 512Mi
